  .theme-toggle .sun { display: none; }
  [data-theme="dark"] .theme-toggle .moon { display: none; }
  [data-theme="dark"] .theme-toggle .sun { display: block; }
  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle:active svg { transform: rotate(180deg); }
  .theme-toggle { transition: transform 0.15s ease, box-shadow 0.15s ease; }

  /* Logo */

    width: 100%;

    justify-content: center;
    margin-bottom: 20px;
    flex-shrink: 0;
    box-sizing: border-box;

    width: 100%;
    height: auto;

    display: block;
  }

  .logo-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--cream-100);
    text-align: center;

    font-size: 21px;

  }

    margin-top: 5px;

  .shop-name {

    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-soft);
    margin: 0 0 60px;
    text-align: center;

  /* Link buttons */

    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 30px;

  .link-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 320px;
    width: 100%;
    margin: 0 auto;
    padding: 9px 14px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 600;
    box-shadow: var(--shadow-btn);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
  }
  .link-btn:nth-child(1) { animation-delay: 0.05s; }
  .link-btn:nth-child(2) { animation-delay: 0.12s; }
  .link-btn:nth-child(3) { animation-delay: 0.19s; }
  .link-btn:nth-child(4) { animation-delay: 0.26s; }
  .link-btn:nth-child(5) { animation-delay: 0.33s; }
  .link-btn:nth-child(6) { animation-delay: 0.40s; }

  .link-btn:active { transform: scale(0.97); }
  @media (hover: hover) {
    .link-btn:hover {

  .icon-badge {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.25s ease;

  .icon-badge svg { width: 16px; height: 16px; }

  .label { flex: 1; }

  .footer {
    margin-top: 50px;
    text-align: center;
    font-size: 12px;
    color: var(--text-soft);
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
    animation-delay: 0.5s;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }

  .logo-wrap { animation: popIn 0.5s ease; }
  .shop-name {

    animation-delay: 0.1s;

  @media (prefers-reduced-motion: reduce) {

      animation: none !important;
      opacity: 1 !important;
    }

</style>

<script>
  // Wire up the buttons from the LINKS config above
  document.getElementById('btn-google').href     = LINKS.googleReview;
  document.getElementById('btn-instagram').href   = LINKS.instagram;
  document.getElementById('btn-facebook').href    = LINKS.facebook;
  document.getElementById('btn-whatsapp').href    = LINKS.whatsapp;
  document.getElementById('btn-website').href     = LINKS.website;
  document.getElementById('btn-youtube').href     = LINKS.youtube;

  document.getElementById('year').textContent = new Date().getFullYear();

  // Theme: respect saved choice, else default to dark
  const root = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('deenin-theme');
  root.setAttribute('data-theme', saved || 'dark');

  toggle.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('deenin-theme', next);
  });
</script>
